<!DOCTYPE html>
<html>
  <head>
    <title>Reviews</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

   <body class="bg-dark text-light">
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>
      
      <ul class="navbar-nav mx-auto flex-row">

        <li class="nav-item">
          <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="movies.html">Movies</a>
        </li>

        <li class="nav-item">
          <a class="nav-link mx-3" href="reviews.html">Reviews</a>
        </li>

      </ul>
      
      <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

     <div class="container mt-4">

       <h3>Reviews</h3>

         <div class="section-card mb-4 bg-secondary p-3">
        <h5>Review Statistics</h5>

        <div id="review-stats" class="row mt-3 text-center">
            
        </div>
    </div>

       <div class="section-card mb-4 bg-secondary p-3">
         <h5>Filter Reviews</h5>

         <div class="d-flex justify-content-between mt-3">
           <button class="btn btn-dark" onclick="filterReviews('all')">All</button>
           <button class="btn btn-dark" onclick="filterReviews('pending')">Pending</button>
           <button class="btn btn-dark" onclick="filterReviews('approved')">Approved</button>
           <button class="btn btn-dark" onclick="filterReviews('rejected')">Rejected</button>
         </div>
       </div>

       <div class="section-card bg-secondary p-3">
         <h5 class="mb-3">Review List</h5>
         
          <div id="review-list">
         
          </div>
       </div>
     </div>

     <script>
      let allReviews = [];

      async function loadReviews() {
        const token = localStorage.getItem("token");

        const response = await fetch("/reviews", {
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const reviews = await response.json();
        allReviews = reviews;
        displayReviews(reviews);
        loadStats(reviews);
      }

      function displayReviews(reviews) {
        const container = document.getElementById("review-list");
        container.innerHTML = "";

        if (reviews.length === 0) {
          container.innerHTML = "<p>No reviews found.</p>";
          return;
        }

        reviews.forEach(r => {
          container.innerHTML += `
          <div class="review-card mb-3">
            <div class="d-flex justify-content-between">
              <div>
                <strong>${r.movie.title}</strong><br>
                <small>by ${r.user.username}</small>
                <small> Rating: ${r.rating}/10</small>
              </div>
              <div class="text-warning text-capitalize">
                ${r.status}
              </div>
            </div>

            <div class="mt-3">
              <input type="text" class="form-control" value="${r.review_text}" readonly>
            </div>

            <div class="mt-3">
              <button class="btn btn-success btn-sm" onclick="approve(${r.id})">Approve</button>
              <button class="btn btn-danger btn-sm" onclick="reject(${r.id})">Reject</button>
            </div>
          </div>
          `;
        });
      }

      function filterReviews(status) {
        if (status === "all") {
          displayReviews(allReviews);
        } else {
          const filtered = allReviews.filter(r => r.status === status);
          displayReviews(filtered);
        }
      }

      function loadStats(reviews) {
        const stats = {
          pending: 0,
          approved: 0,
          rejected: 0
        };

        reviews.forEach(r => {
          stats[r.status]++;
        });

        document.getElementById("review-stats").innerHTML = `
        <div class="col-md-4">
          <div class="card bg-dark text-light p-3">
            Pending<br><h4>${stats.pending}</h4>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-dark text-light p-3">
            Approved<br><h4>${stats.approved}</h4>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-dark text-light p-3">
            Rejected<br><h4>${stats.rejected}</h4>
          </div>
        </div>
        `;
      }
        async function approve(id) {
          const token = localStorage.getItem("token");

          await fetch(`/reviews/${id}/approve`, {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + token
        }
      });

      loadReviews();
  
      }

      async function reject(id) {
        const token = localStorage.getItem("token");

        await fetch(`/reviews/${id}/reject`, {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + token
      }
    });

    loadReviews();
   }
   loadReviews();


     </script>
   </body>
</html>
