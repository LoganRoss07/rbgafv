<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center" style="height: 100vh;">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>

    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="index.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>
    <div class="card bg-secondary p-4" style="width: 350px;">
        <h3 class="text-center mb-4">Login</h3>

        <form id="login-form">
            <input type="email" id="email" class="form-control mb-3 bg-dark text-light" placeholder="Email">
            <input type="password" id="password" class="form-control mb-3 bg-dark text-light" placeholder="Password">
            <button class="btn btn-dark w-100">Login</button>
        </form>
    </div>

    <script>
      document.getElementById("login-form").addEventtListener("submit", async (e) => {
        e.preventDefault();

        const res = await fetch("/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            email: email.value,
            password: password.value
        })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem("token", data.access_token);
        window.location.href = "index.html";
      } else {
        alert(data.detail || "Login failed");
      }
    });
    </script>

</body>
</html>
