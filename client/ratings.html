<!DOCTYPE html>
<html>
<head>
    <title>Browse Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>

    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="index.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

<div class="container mt-4">
    <div class="card p-4 mb-4 bg-secondary">
        <h3 class="mb-4">User Statistics</h3>

        <div id="stats" class="row text-center">
            
        </div>
    </div>

    <h4 class="mb-3">List of rated movies</h4>
    <div id="rating-list">

    </div>
</div>

<script>
    async function loadRatings() {
        const token = localStorage.getItem("token");

        const response = await fetch("/user/ratings", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const ratings = await response.json();

        const container = document.getElementById("rating-list");
        const statsContainer = document.getElementById("stats");

        container.innerHTML = "";
        statsContainer.innerHTML = "";

        if (ratings.length === 0) {
            container.innerHTML = "<p>You haven't rated any movies yet.</p>";
            return;
        }

        let total = ratings.length;
        let avg = (ratings.reduce((sum, r) => sum + r.rating, 0) / total).toFixed(1);

        let genreCounts = {};
        ratings.forEach(r => {
            let g = r.movie.genre || "Unknown";
            genreCounts[g] = (genreCounts[g] || 0) + 1;
        });

        let favouriteGenre = Object.keys(genreCounts).reduce((a, b) => genreCounts[a] > genreCounts[b] ? a : b);

        statsContainer.innerHTML = `
        <div class="col-4">
            <div class="card p-3 bg-dark text-light">
                <p>Movies Rated</p>
                <h4>${total}</h4>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 bg-dark text-light">
                <p>Average Rating</p>
                <h4>${avg}</h4>
            </div>
        </div>
        <div class="col-4">
            <div class="card p-3 bg-dark text-light">
                <p>Favourite Genre</p>
                <h4>${favouriteGenre}</h4>
            </div>
        </div>
        `;

        ratings.forEach(r => {
            container.innerHTML += `
            <div class="row border p-3 mt-3 align-items-center bg-secondary rounded">
                <div class="col-2">
                    <img src="${r.movie.image.url || 'placeholder.jpg'}" class="img-fluid">
                </div>

                <div class="col-10">
                    <h6>${r.movie.title}</h6>
                    <div class="row mt-2">
                        <div class="col-6">
                            <div class="border p-2 text-center bg-dark text-light">
                                Your Rating: ${r.rating}
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="border p-2 text-center bg-dark text-light">
                                Average Rating: ${r.movie.rating}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            `;
        });
    }

loadRatings();
</script>

</body>
</html>
