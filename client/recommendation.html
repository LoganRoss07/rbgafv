<!DOCTYPE html>
<html>
<head>
    <title>Recommended Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>

    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="index.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
        <li class="nav-item">
        <a class="nav-link mx-3" href="dashboard.html">Dashboard</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Recommended Movies</h3>
    <button class="btn btn-secondary" onclick="loadRecommendations()">Refresh</button>
  </div>

  <div class="card mt-3 p-3 bg-secondary text-light">
        <p>These movie recommendations have been chosen for you based on your previous movies you have watched and rated.</p>
  </div>

  <div class="row mt-4" id="recommendation-list">

  </div>


</div>

<script>
  async function loadRecommendations() {
    const response = await fetch("/recommendations", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    const movies = await response.json();

    const container = document.getElementById("recommendation-list");
    container.innerHTML = "";

    if (movies.length === 0) {
      container.innerHTML = "<p>No recommendations yet. Rate some movies to get personalized recommendations!</p>";
      return;
    }

    movies.forEach(movie => {
      container.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card bg-dark text-light border-0 h-100">
        <img src="${movie.image_url || 'placeholder.jpg'}" class="card-img-top">
        <div class="card-body d-flex flex-column text-center">
          <h5 class="card-title">${movie.title}</h5>
          <p> class="card-text">Release date: ${movie.release_date}</p>
          <p class="card-text">Rating: ${movie.rating}/10</p>
          <button class="btn btn-secondary mt-auto" onclick="rateMovie(${movie.id})">Rate this movie</button>
        </div>
      </div>
    </div>
    `;
  });
  }

  loadRecommendations();
</script>
</body>
</html>
