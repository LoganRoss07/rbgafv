<!DOCTYPE html>
<html>
<head>
    <title>Browse Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="logo.png" width="40">
    </a>

    <ul class="navbar-nav mx-auto flex-row">
      <li class="nav-item">
        <a class="nav-link mx-3" href="browser.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="index.html">Recommendations</a>
      </li>
      <li class="nav-item">
        <a class="nav-link mx-3" href="ratings.html">My Ratings</a>
      </li>
    </ul>

    <img src="profile.jpg" width="40" class="rounded-circle">
  </div>
</nav>

    <div class = "container bg-dark text-light p-4 rounded">
    <h3>Browse Movies</h3>

    <div class="card p-4 mb-4 bg-secondary text-light">
        <h5>Search and filter</h5>

        <input id="searchInput" type="text" class="form-control mb-3 bg-dark text-light" placeholder="Search Movie Title">
>

        <select id="genreFilter" class="form-select bg-dark text-light">
            <option>All genres</option>
            <option>Action</option>
            <option>Comedy</option>
            <option>Drama</option>
        </select>
    </div>

    <div class="card m-4 bg-secondary">
        <div class="card-body">
            <div class="container text-center">
                <div id="movie-list" class="row g-4">
                    
                </div>
            </div>
        </div>
    </div>

    <script>
        let allMovies = [];

        async function loadMovies() {
            const token = localStorage.getItem("token");

            const response = await fetch("/movies", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const movies = await response.json();
            allMovies = movies;
            displayMovies(movies);
        }

        function displayMovies(movies){
            const container = document.getElementById("movie-list");
            container.innerHTML = "";

            movies.forEach(movie => {
                container.innerHTML += `
                <div class="col-md-4">
                    <div class="card bg-dark text-light border-0 h-100">
                        <img src="${movie.image_url || 'placeholder.jpg'}" class="card-img-top">
                        <div class="card-body d-flex flex-column text-center">
                            <h5 class="card-title">${movie.title}</h5>
                            <p class="card-text">Release date: ${movie.release_date}</p>
                            <p class="card-text">Rating: ${movie.rating}/10</p>
                            <button class="btn btn-secondary mt-auto" onclick="rateMovie(${movie.id})">Add Rating</button>
                        </div>
                    </div>
                </div>
                `;})
        }

        function filterMovie() {
            const search = document.getElementById("searchInput").value.toLowerCase();
            const genre = document.getElementById("genreFilter").value;

            let filtered = allMovies.filter(movie => {
                const matchesSearch = movie.title.toLowerCase().includes(search);
                const matchesGenre = genre === "all" || movie.genre === genre;
                return matchesSearch && matchesGenre;
            });
            displayMovies
        }

        async function rateMovie(movieID) {
            const rating = prompt("Enter rating (1-10):");

            if (!rating) return;

            const token = localStorage.getItem("token");

            await fetch("/rate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    movie_id: movieID,
                    rating: rating
            })
        });
        alert("Rating submitted!");
        }

        document.getElementById("searchInput").addEventListener("input", filterMovie);
        document.getElementById("genreFilter").addEventListener("change", filterMovie);

        loadMovies();
    </script>

</body>
</html>
